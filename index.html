<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cafe Heminis - QR Menu</title>
  <link rel="styles.css?v=20260709">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>OUR MENU</h1>
      <p class="subtitle">Cafe Heminis - Your Neighborhood Cafe</p>
    </div>
  </header>

  <main class="container">
    <div class="menu-tabs" role="tablist">
      <button class="menu-tab is-active" type="button" data-panel="drinks-panel">Drinks</button>
      <button class="menu-tab" type="button" data-panel="food-panel">Food</button>
    </div>

    <section id="drinks-panel" class="menu-panel is-active">
        <ul class="menu-list" id="drinks-list"></ul>
    </section>

    <section id="food-panel" class="menu-panel">
        <ul class="menu-list" id="food-list"></ul>
    </section>
  </main>

  <div id="imageModal" class="image-modal" aria-hidden="true">
    <div class="image-modal-backdrop" id="modalBackdrop"></div>
    <div class="image-modal-content">
      <button class="close-btn" id="closeModal">×</button>
      <img id="featuredPhoto" src="" alt="">
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
