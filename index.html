<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cafe Heminis - QR Menu</title>
  <link rel="stylesheet" href="styles.css?v=20260703">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>OUR MENU</h1>
      <p class="subtitle">Cafe Heminis - Your Neighborhood Cafe</p>
    </div>
  </header>

  <main class="container">
    
    <div class="menu-tile">
      
      <div class="menu-tabs" role="tablist" aria-label="Menu categories">
        <button class="menu-tab is-active" type="button" data-panel="drinks-panel" aria-selected="true">Drinks</button>
        <button class="menu-tab" type="button" data-panel="food-panel" aria-selected="false">Food</button>
      </div>

      <section id="food-panel" class="menu-panel" aria-label="Food menu">
        <h2>Snacks & Pre-Order</h2>
        <div class="menu-list" id="food-list"></div>
      </section>

      <section id="drinks-panel" class="menu-panel is-active" aria-label="Drinks menu">
        <h2>Cafe Heminis Drinks</h2>
        <div class="menu-list" id="drinks-list"></div>
      </section>
      
    </div> <footer class="site-footer">
      <p>Designed for mobile — open on your phone to view the menu.</p>
    </footer>
  </main>

  <div id="imageModal" class="image-modal" aria-hidden="true">
    <div class="image-modal-backdrop" id="modalBackdrop" style="position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8);"></div>
    <div class="image-modal-content" role="dialog" aria-modal="true" aria-label="Enlarged photo view" style="position: relative; margin: 10% auto; max-width: 90%; text-align: center;">
      <button class="close-btn" id="closeModal" aria-label="Close photo view" style="position: absolute; right: 10px; top: 10px; font-size: 2rem; background: none; color: white; border: none; cursor: pointer;">×</button>
      <img id="featuredPhoto" src="" alt="" style="max-width: 100%; max-height: 70vh; border-radius: 4px;">
    </div>
  </div>

  <script src="script.js?v=20260703" defer></script>
</body>
</html>
